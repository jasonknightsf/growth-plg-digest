<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Growth & PLG Intelligence — Daily Digest</title>
<meta name="description" content="Daily curated articles, podcasts and videos on product-led growth, onboarding, conversion, and growth loops for SaaS teams.">
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif; background: #f5f6fa; color: #1a1d2e; min-height: 100vh; }
  .header { background: #000; border-bottom: 1px solid #1f1f1f; padding: 20px 32px 16px; position: sticky; top: 0; z-index: 10; }
  .header-inner { max-width: 960px; margin: 0 auto; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .ts-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
  .ts-logo-mark { width: 32px; height: 32px; flex-shrink: 0; }
  .ts-wordmark { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -0.3px; line-height: 1; }
  .header-divider { width: 1px; height: 28px; background: #333; flex-shrink: 0; }
  .header-title { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: -0.2px; line-height: 1.2; }
  .header-sub { font-size: 11.5px; color: #6b7280; margin-top: 3px; }
  .header-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .badge { border-radius: 6px; padding: 4px 11px; font-size: 12px; font-weight: 600; }
  .badge-date { background: #1a1a1a; color: #9ca3af; border: 1px solid #2a2a2a; }
  .badge-count { background: #1a1a1a; color: #818cf8; border: 1px solid #2a2a2a; }
  .tabs { display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; padding-top: 2px; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; border: 1.5px solid #2a2a2a; background: transparent; color: #9ca3af; transition: all 0.12s; font-family: inherit; }
  .tab:hover { background: #1a1a1a; color: #e5e7eb; border-color: #444; }
  .tab.active[data-cat="All"]               { background: #fff; color: #000; border-color: #fff; }
  .tab.active[data-cat="PLG Strategy"]      { background: #6366f1; color: #fff; border-color: #6366f1; }
  .tab.active[data-cat="Onboarding & UX"]   { background: #0d9488; color: #fff; border-color: #0d9488; }
  .tab.active[data-cat="Conversion & PQLs"] { background: #d97706; color: #fff; border-color: #d97706; }
  .tab.active[data-cat="Growth Loops"]      { background: #2563eb; color: #fff; border-color: #2563eb; }
  .tab.active[data-cat="Podcasts & Video"]  { background: #db2777; color: #fff; border-color: #db2777; }
  .content { padding: 24px 32px 60px; max-width: 960px; margin: 0 auto; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 16px; }
  @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } .header { padding: 16px 20px 14px; } .content { padding: 20px 20px 40px; } }
  .card { background: #fff; border: 1px solid #e8eaf0; border-radius: 14px; padding: 18px 20px; display: flex; flex-direction: column; gap: 10px; transition: box-shadow 0.15s, transform 0.15s; }
  .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); transform: translateY(-2px); }
  .card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .cat-pill { font-size: 10.5px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; border-radius: 20px; padding: 3px 10px; white-space: nowrap; }
  .pill-plg        { background: #ede9fe; color: #6d28d9; }
  .pill-onboarding { background: #ccfbf1; color: #0f766e; }
  .pill-conversion { background: #fef3c7; color: #b45309; }
  .pill-growth     { background: #dbeafe; color: #1d4ed8; }
  .pill-podcast    { background: #fce7f3; color: #9d174d; }
  .source-tag { font-size: 11px; font-weight: 600; color: #6b7280; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 5px; padding: 2px 8px; white-space: nowrap; }
  .card-title { font-size: 14px; font-weight: 700; color: #111827; line-height: 1.45; letter-spacing: -0.2px; }
  .card-summary { font-size: 13px; color: #4b5563; line-height: 1.65; flex: 1; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 10px; border-top: 1px solid #f3f4f6; margin-top: 2px; }
  .pub-date { font-size: 11px; font-weight: 500; color: #9ca3af; display: flex; align-items: center; gap: 4px; }
  .read-link { font-size: 12.5px; font-weight: 600; color: #6366f1; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; transition: opacity 0.12s; }
  .read-link.podcast-link { color: #db2777; }
  .read-link:hover { opacity: 0.7; }
  .empty { text-align: center; padding: 80px 24px; color: #9ca3af; font-size: 14px; }
  .page-footer { text-align: center; padding: 20px; font-size: 11.5px; color: #d1d5db; border-top: 1px solid #f3f4f6; margin-top: 20px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div class="header-left">
        <a class="ts-logo" href="https://thoughtspot.com" target="_blank">
          <span class="ts-wordmark">ThoughtSpot</span>
        </a>
        <div class="header-divider"></div>
        <div>
          <div class="header-title">Growth &amp; PLG Intelligence</div>
          <div class="header-sub">Daily digest · Articles, Podcasts &amp; Video · 2025–2026</div>
        </div>
      </div>
      <div class="header-meta">
        <span class="badge badge-date" id="dateDisplay"></span>
        <span class="badge badge-count" id="countDisplay"></span>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" data-cat="All" onclick="filter('All')">All</button>
      <button class="tab" data-cat="PLG Strategy" onclick="filter('PLG Strategy')">PLG Strategy</button>
      <button class="tab" data-cat="Onboarding & UX" onclick="filter('Onboarding & UX')">Onboarding &amp; UX</button>
      <button class="tab" data-cat="Conversion & PQLs" onclick="filter('Conversion & PQLs')">Conversion &amp; PQLs</button>
      <button class="tab" data-cat="Growth Loops" onclick="filter('Growth Loops')">Growth Loops</button>
      <button class="tab" data-cat="Podcasts & Video" onclick="filter('Podcasts & Video')">🎧 Podcasts &amp; Video</button>
    </div>
  </div>
</div>

<div class="content">
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">No content in this category.</div>
  <div class="page-footer">Updated daily · Articles, podcasts &amp; video from Lenny's, Reforge, ProductLed, Growth Unhinged, SaaStr &amp; more · Last 6 months only</div>
</div>

<script>
const DATA = [
  { cat:"PLG Strategy", pill:"pill-plg", source:"ProductLed", date:"Mar 2025",
    title:"State of B2B SaaS in 2025: Analysis of 446 Companies",
    summary:"Self-serve revenue is the single most powerful growth lever in B2B SaaS—yet 36.3% of companies still report zero self-serve revenue. Companies that make the transition see 25.9% better free-to-paid conversion and 18.3% faster time-to-value compared to peers.",
    url:"https://productled.com/blog/state-of-b2b-saas-2025-report" },

  { cat:"PLG Strategy", pill:"pill-plg", source:"ProductLed", date:"Nov 2025",
    title:"PLG Predictions For 2026: The Playbook is Being Rewritten. Fast.",
    summary:"AI onboarding now makes activation instant by eliminating multi-step walkthroughs and configuring experiences based on user goals in real time. The defining benchmark for 2026 is no longer 'value in the first session'—it's value delivered in under 60 seconds.",
    url:"https://productled.com/blog/plg-predictions-for-2026" },

  { cat:"PLG Strategy", pill:"pill-plg", source:"Growth Unhinged", date:"Feb 2025",
    title:"The Best Growth Tactics of 2025",
    summary:"Credit-based pricing surged through 2025, with 79 of the top 500 SaaS companies now offering it—up from 35 at the start of the year. For 2026, pricing is swinging back toward simplicity, with major platforms bundling AI at modest per-user increases rather than standalone AI tiers.",
    url:"https://www.growthunhinged.com/p/2025-state-of-saas-pricing-changes" },

  { cat:"PLG Strategy", pill:"pill-plg", source:"Growth Unhinged", date:"Jan 2025",
    title:"2025 SaaS Benchmarks: What's Really Going On in Software",
    summary:"The median B2B SaaS company planned for 35% growth in 2025 but achieved only 26%—a nine-point gap revealing how challenging the current environment is. Top performers are now generating 40% of new ARR from existing customers, up from 25% in 2022, marking a decisive shift toward expansion as the primary growth engine.",
    url:"https://www.growthunhinged.com/p/2025-saas-benchmarks-report" },

  { cat:"Onboarding & UX", pill:"pill-onboarding", source:"Growth Unhinged", date:"Apr 2025",
    title:"Your Guide to Product-Led Onboarding",
    summary:"Personalizing onboarding by asking users their primary reason for signing up is almost guaranteed to improve activation—yet most products still use a one-size-fits-all flow. The best sequences ask 1–2 targeted questions then tailor the entire experience around helping users reach their 'aha' moment as fast as possible.",
    url:"https://www.growthunhinged.com/p/your-guide-to-product-led-onboarding" },

  { cat:"Onboarding & UX", pill:"pill-onboarding", source:"PLGTM", date:"Dec 2025",
    title:"Inside PLGTM 2025: A Recap and 2026 Plans",
    summary:"The 2025 PLG landscape saw a decisive shift toward hybrid product-led sales motions, where self-serve adoption leads and enterprise sales layers on top at precisely the right moment. For 2026, the biggest opportunity is combining AI-assisted onboarding with usage-based triggers to qualify and route users more precisely.",
    url:"https://plgtm.substack.com/p/inside-plgtm-2025-a-recap-and-2026" },

  { cat:"Onboarding & UX", pill:"pill-onboarding", source:"NewTechnique", date:"Jun 2025",
    title:"Tips on PLG Onboarding Flows",
    summary:"The most effective PLG onboarding flows reduce cognitive load by surfacing only what the user needs to accomplish their immediate goal—not the full feature set. Three structural improvements—contextual empty states, inline guidance, and milestone celebrations—have the highest documented impact on activation rates.",
    url:"https://newtechnique.substack.com/p/tips-on-plg-onboarding-flows" },

  { cat:"Conversion & PQLs", pill:"pill-conversion", source:"Growth Unhinged", date:"Feb 2026",
    title:"The 2026 Free-to-Paid Conversion Report",
    summary:"The median free-to-paid conversion across SaaS sits at 8% in 2026, but products requiring a credit card at signup see 5x higher conversion—25–35% is good, 50–60% is great. Free trials dominate as the primary entry model at 57% of products, more than double the rate of freemium at 26%.",
    url:"https://www.growthunhinged.com/p/free-to-paid-conversion-report" },

  { cat:"Conversion & PQLs", pill:"pill-conversion", source:"SaaStr", date:"Sep 2025",
    title:"85% of Business App Trials Start on Day 0. Don't Waste Your Shot.",
    summary:"Analysis of 75,000 apps shows that 85% of trial users who will ever convert do so on the day they sign up—making Day 0 activation the single most critical window in your funnel. Products that fail to deliver a meaningful first-session experience almost never recover those users through follow-up or re-engagement.",
    url:"https://cloud.substack.com/p/85-of-business-app-trials-start-on" },

  { cat:"Conversion & PQLs", pill:"pill-conversion", source:"Substack", date:"Oct 2025",
    title:"Your Trial-to-Paid Conversion is Where Revenue Goes to Die",
    summary:"Most SaaS companies invest heavily in acquisition but leave conversion to chance—treating trial-to-paid as a passive event rather than an active design problem. The highest-converting products identify the specific action that predicts upgrade and engineer every onboarding touchpoint to get users there.",
    url:"https://angelastewartai.substack.com/p/your-trial-to-paid-conversion-is" },

  { cat:"Growth Loops", pill:"pill-growth", source:"Growth Unhinged", date:"Mar 2025",
    title:"The State of B2B Monetization in 2025",
    summary:"B2B SaaS companies are now generating 40% of total new ARR from existing customers—up from 25% in 2022—signaling a fundamental shift toward expansion as the primary growth driver. Companies mastering expansion through usage-based triggers and product-qualified account signals are consistently outperforming peers on NRR.",
    url:"https://www.growthunhinged.com/p/2025-state-of-b2b-monetization" },

  { cat:"Growth Loops", pill:"pill-growth", source:"PLGTM", date:"Nov 2025",
    title:"Applying Lean Manufacturing Principles to SaaS GTM Strategies",
    summary:"Lean manufacturing's core principle—eliminate waste at every step—maps directly onto PLG go-to-market: every friction point in the activation funnel is waste to be removed. Teams applying lean frameworks to their GTM are cutting low-signal touchpoints that slow users down without adding measurable value.",
    url:"https://plgtm.substack.com/p/applying-lean-manufacturing-principles" },

  { cat:"Podcasts & Video", pill:"pill-podcast", source:"Lenny's Podcast", date:"Dec 2025",
    title:"The New AI Growth Playbook for 2026: How Lovable Hit $200M ARR in One Year",
    summary:"Elena Verna reveals why 60–70% of traditional growth tactics no longer apply for AI products, drawing on Lovable's run to $200M ARR in under a year with just 100 employees. The episode reframes activation as a product team responsibility and introduces 'minimum lovable product' as the new bar replacing MVP.",
    url:"https://www.lennysnewsletter.com/p/the-new-ai-growth-playbook-for-2026-elena-verna" },

  { cat:"Podcasts & Video", pill:"pill-podcast", source:"SaaStr Podcast", date:"Aug 2025",
    title:"PLG to Enterprise to SMB: How Calendly Balances Self-Serve and Sales",
    summary:"Calendly's founder Tope Awotona shares how the company navigated from pure PLG to a hybrid model serving enterprise and SMB simultaneously. Candid lessons on when to layer in sales, how to control CAC as you scale, and keeping the product at the center of growth throughout.",
    url:"https://saastr.libsyn.com/saastr-816" },

  { cat:"Podcasts & Video", pill:"pill-podcast", source:"YouTube", date:"Sep 2025",
    title:"Next-Gen PLG: How AI, Community & Personalization Redefine Growth in 2025",
    summary:"Tactical session breaking down how leading PLG companies are moving beyond freemium and viral loops toward AI-powered, community-centric growth models. Covers real-time personalization in onboarding, community integration, and why the traditional PLG funnel is being replaced by a continuous activation loop.",
    url:"https://www.youtube.com/watch?v=ttNQ3d5hvnw" },

  { cat:"Podcasts & Video", pill:"pill-podcast", source:"YouTube", date:"Jan 2025",
    title:"The 7 Key Strategies for Product Growth — Aakash Gupta",
    summary:"PLG expert Aakash Gupta outlines seven concrete strategies for product-led growth, drawing on data from hundreds of SaaS companies. Covers PQL identification, activation rate optimization, and the specific metrics that separate top-quartile PLG companies from the rest.",
    url:"https://www.youtube.com/watch?v=fXrzBfZk5zo" },

  { cat:"Podcasts & Video", pill:"pill-podcast", source:"Spotify · Growth Machines", date:"2025",
    title:"Pricing Challenges in PLG — Kyle Poyar (Growth Unhinged)",
    summary:"Kyle Poyar breaks down the most common pricing mistakes PLG companies make—from freemium models that give away too much to credit-based tiers that confuse buyers. The conversation covers how to find the right monetization levers without killing the self-serve motion that got you there.",
    url:"https://creators.spotify.com/pod/profile/vincent-jong/episodes/Pricing-challenges-in-PLG--Kyle-Poyar-e2t0t36" }
];

let currentCat = 'All';

function filter(cat) {
  currentCat = cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab[data-cat="' + cat + '"]').classList.add('active');
  render();
}

function render() {
  const list = currentCat === 'All' ? DATA : DATA.filter(a => a.cat === currentCat);
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  document.getElementById('countDisplay').textContent = list.length + ' item' + (list.length !== 1 ? 's' : '');
  if (!list.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  const isPodcast = a => a.cat === 'Podcasts & Video';
  grid.innerHTML = list.map(a => `
    <div class="card">
      <div class="card-top">
        <span class="cat-pill ${a.pill}">${a.cat}</span>
        <span class="source-tag">${a.source}</span>
      </div>
      <div class="card-title">${a.title}</div>
      <div class="card-summary">${a.summary}</div>
      <div class="card-footer">
        <span class="pub-date">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="1" y="2" width="9" height="8" rx="1.5"/>
            <path d="M1 5h9M4 1v2M7 1v2"/>
          </svg>
          ${a.date}
        </span>
        <a class="read-link ${isPodcast(a) ? 'podcast-link' : ''}" href="${a.url}" target="_blank">
          ${isPodcast(a) ? '🎧 Listen / Watch' : 'Read Article'}
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 5.5h8M5.5 1 10 5.5 5.5 10"/>
          </svg>
        </a>
      </div>
    </div>
  `).join('');
}

const d = new Date();
document.getElementById('dateDisplay').textContent = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
render();
</script>
</body>
</html>
