<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Growth & PLG Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { color-scheme: light; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:#f1f5f9; color:#1e293b; }
.header { background:#000; border-bottom:1px solid #1f1f1f; padding:20px 32px 16px; position:sticky; top:0; z-index:10; }
.header-inner { max-width:1200px; margin:0 auto; }
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.header-left { display:flex; align-items:center; gap:16px; }
.ts-logo { display:flex; align-items:center; text-decoration:none; flex-shrink:0; }
.ts-wordmark { font-size:15px; font-weight:700; color:#fff; letter-spacing:-0.3px; line-height:1; }
.header-divider { width:1px; height:28px; background:#333; flex-shrink:0; }
.header-title { font-size:15px; font-weight:600; color:#fff; letter-spacing:-0.2px; line-height:1.2; }
.header-sub { font-size:11.5px; color:#6b7280; margin-top:3px; }
.header-meta { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.badge { border-radius:6px; padding:4px 11px; font-size:12px; font-weight:600; }
.badge-date { background:#1a1a1a; color:#9ca3af; border:1px solid #2a2a2a; }
.badge-count { background:#1a1a1a; color:#818cf8; border:1px solid #2a2a2a; }
.tabs { display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; padding-top:2px; flex-wrap:nowrap; padding-bottom:2px; }
.tabs::-webkit-scrollbar { display:none; }
.tab { padding:6px 16px; border-radius:20px; font-size:13px; font-weight:500; cursor:pointer; white-space:nowrap; border:1.5px solid #2a2a2a; background:transparent; color:#9ca3af; transition:all 0.12s; font-family:inherit; }
.tab:hover { background:#1a1a1a; color:#e5e7eb; border-color:#444; }
.tab.active { background:#fff; color:#000; border-color:#fff; }
.tab.active[data-cat="plg"] { background:#6366f1; color:#fff; border-color:#6366f1; }
.tab.active[data-cat="onboarding"] { background:#0d9488; color:#fff; border-color:#0d9488; }
.tab.active[data-cat="conversion"] { background:#d97706; color:#fff; border-color:#d97706; }
.tab.active[data-cat="loops"] { background:#2563eb; color:#fff; border-color:#2563eb; }
.tab.active[data-cat="podcasts"] { background:#db2777; color:#fff; border-color:#db2777; }
.tab.active[data-cat="substack"] { background:#ff6719; color:#fff; border-color:#ff6719; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1.2rem; padding:1.25rem 2rem; max-width:1200px; margin:0 auto; }
.card { background:#fff; border-radius:12px; padding:1.25rem; box-shadow:0 1px 3px rgba(0,0,0,.07); border:1px solid #e2e8f0; display:flex; flex-direction:column; gap:.65rem; transition:transform .2s,box-shadow .2s; }
.card:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(0,0,0,.11); }
.card-meta { display:flex; align-items:center; justify-content:space-between; gap:.5rem; flex-wrap:wrap; }
.pill { font-size:.7rem; font-weight:600; padding:.2rem .6rem; border-radius:20px; white-space:nowrap; }
.pill-plg { background:#ede9fe; color:#5b21b6; }
.pill-onboarding { background:#ccfbf1; color:#0f766e; }
.pill-conversion { background:#fef3c7; color:#92400e; }
.pill-loops { background:#dbeafe; color:#1e40af; }
.pill-podcast { background:#fce7f3; color:#9d174d; }
.pill-substack { background:#fff7ed; color:#c2410c; }
.card-date { display:flex; align-items:center; gap:.3rem; font-size:.72rem; color:#94a3b8; }
.card-date svg { width:11px; height:11px; opacity:.7; }
.source { font-size:.72rem; color:#94a3b8; font-weight:500; }
.card h3 { font-size:.95rem; font-weight:600; color:#0f172a; line-height:1.4; }
.card p { font-size:.84rem; color:#475569; line-height:1.6; flex:1; }
.card a { display:inline-block; margin-top:.2rem; padding:.45rem .9rem; background:#4f46e5; color:white; border-radius:6px; font-size:.78rem; font-weight:600; text-decoration:none; transition:background .2s; align-self:flex-start; }
.card a:hover { background:#4338ca; }
.podcast-link { background:#db2777 !important; }
.podcast-link:hover { background:#be185d !important; }
.substack-link { background:#ff6719 !important; }
.substack-link:hover { background:#ea580c !important; }
footer { text-align:center; padding:1.5rem 1rem; color:#94a3b8; font-size:.75rem; border-top:1px solid #e2e8f0; margin-top:.5rem; }
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div class="header-left">
        <a class="ts-logo" href="https://thoughtspot.com" target="_blank"><span class="ts-wordmark">ThoughtSpot</span></a>
        <div class="header-divider"></div>
        <div>
          <div class="header-title">Growth &amp; PLG Intelligence</div>
          <div class="header-sub">Daily digest &middot; Articles, Podcasts &amp; Video &middot; 2025–2026</div>
        </div>
      </div>
      <div class="header-meta">
        <span class="badge badge-date" id="dateDisplay"></span>
        <span class="badge badge-count" id="countDisplay"></span>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" data-cat="all" onclick="filter('all',this)">All</button>
      <button class="tab" data-cat="plg" onclick="filter('plg',this)">PLG Strategy</button>
      <button class="tab" data-cat="onboarding" onclick="filter('onboarding',this)">Onboarding &amp; UX</button>
      <button class="tab" data-cat="conversion" onclick="filter('conversion',this)">Conversion &amp; PQLs</button>
      <button class="tab" data-cat="loops" onclick="filter('loops',this)">Growth Loops</button>
      <button class="tab" data-cat="podcasts" onclick="filter('podcasts',this)">🎙 Podcasts &amp; Video</button>
      <button class="tab" data-cat="substack" onclick="filter('substack',this)">✍️ Substack</button>
    </div>
  </div>
</div>
<div class="grid" id="grid"></div>
<footer>Growth &amp; PLG Intelligence &middot; ThoughtSpot &middot; Auto-refreshed daily &middot; Last 6 months only</footer>
<script>
const DATA = [
  {cat:"plg",pill:"PLG Strategy",pillClass:"pill-plg",source:"SaaS Magazine",date:"Jan 2026",title:"PLG in 2026: Product-Led Growth Evolves Into Full-Stack GTM",summary:"PLG has transcended the original 'let the product sell itself' mantra, layering AI-driven onboarding, sales-assisted motions, and usage-based expansion into a full-stack GTM engine. Only 27% of PLG companies report sustained year-over-year expansion, driving the industry toward more sophisticated hybrid models.",url:"https://www.saasmag.com/product-led-growth-next-chapter-saas-2026/"},
  {cat:"plg",pill:"PLG Strategy",pillClass:"pill-plg",source:"UserGuiding",date:"Feb 2026",title:"The State of Product-Led Growth in SaaS for 2026",summary:"58% of B2B SaaS companies now run some form of PLG with 91% planning to increase investment—yet the gap between leaders and laggards has never been wider. Top-quartile PLG companies generate 40–60% of ARR from existing customers via usage-based expansion, while the bottom quartile caps out at 15–25%.",url:"https://userguiding.com/blog/state-of-plg-in-saas"},
  {cat:"plg",pill:"PLG Strategy",pillClass:"pill-plg",source:"ProductLed",date:"Jan 2026",title:"PLG Predictions for 2026: The Playbook Is Being Rewritten Fast",summary:"The PLG 'user' is shifting from humans to AI agents, fundamentally rewriting activation metrics, product design, support needs, and monetization models across B2B SaaS. Pricing is accelerating away from per-seat toward per-task and per-outcome, compressing adoption timelines that would have taken a decade under traditional models.",url:"https://productled.com/blog/plg-predictions-for-2026"},
  {cat:"plg",pill:"PLG Strategy",pillClass:"pill-plg",source:"Aakash Gupta (Signals & Stories)",date:"Jan 2026",title:"How to Build Product-Led Growth in 2026: The Complete 7-Layer Playbook",summary:"A practitioner-grade deep dive into seven compounding layers of a modern PLG engine, from viral acquisition loops to AI-powered expansion revenue triggers at the moment of usage limits. The framework emphasizes that PLG without a precisely defined activation milestone is just a free trial with good marketing intentions.",url:"https://www.news.aakashg.com/p/plg-in-2026"},
  {cat:"plg",pill:"PLG Strategy",pillClass:"pill-plg",source:"Mixpanel",date:"Mar 2026",title:"Product-Led Growth in 2026: A Complete Guide and the Metrics That Actually Matter",summary:"Mixpanel's comprehensive breakdown separates vanity metrics from the activation rates, expansion MRR, and time-to-value signals that actually predict long-term retention and revenue compounding. A standout data point: 27% of all AI application spend now flows through PLG motions—4x the rate of traditional SaaS at 7%.",url:"https://mixpanel.com/blog/product-led-growth/"},
  {cat:"onboarding",pill:"Onboarding & UX",pillClass:"pill-onboarding",source:"Product School",date:"Nov 2025",title:"Product-Led Onboarding: How to Do It Right in 2025",summary:"Effective PLG onboarding is built around a precisely defined 'aha moment'—the first scheduling confirmation for Calendly, the first team message for Slack—that users reach within 5–10 minutes of signup. Personalized onboarding paths have been shown to increase Day 30 retention by 52% versus generic, linear flows.",url:"https://productschool.com/blog/product-strategy/product-led-onboarding"},
  {cat:"onboarding",pill:"Onboarding & UX",pillClass:"pill-onboarding",source:"Brightscout",date:"Dec 2025",title:"SaaS Onboarding UX: Why Most Products Lose Users in the First 7 Days",summary:"Research shows that 60–75% of new SaaS users churn within the first week, with root causes consistently tied to unclear value propositions, excessive friction at signup, and delayed time-to-value delivery. For mid-market SaaS companies, cutting time-to-value by just 20% was shown to lift ARR growth by 18%.",url:"https://www.brightscout.com/insight/saas-onboarding-ux"},
  {cat:"onboarding",pill:"Onboarding & UX",pillClass:"pill-onboarding",source:"Design Studio UI/UX",date:"Jan 2026",title:"SaaS Onboarding UX: Best Practices, Patterns & Examples (2026)",summary:"A pattern library of modern onboarding UX covering progressive disclosure, empty-state design, and AI-guided contextual tooltips that adapt in real time to user behavior signals. The analysis argues that onboarding experience accounts for approximately 75% of early churn risk, making the first session the highest-leverage design investment in any SaaS product.",url:"https://www.designstudiouiux.com/blog/saas-onboarding-ux/"},
  {cat:"onboarding",pill:"Onboarding & UX",pillClass:"pill-onboarding",source:"shno.co",date:"Feb 2026",title:"SaaS Onboarding Statistics for 2026: Adoption, Retention, Tools, and Metrics",summary:"A data-rich aggregation of 2026 onboarding benchmarks shows automated onboarding reduces time-to-value by 30–50%, and 86% of customers report increased loyalty toward businesses that invest in the post-signup experience. Personalized onboarding correlates with an 82% improvement in retention, a 23% reduction in churn, and an 80% increase in satisfaction scores.",url:"https://www.shno.co/marketing-statistics/saas-onboarding-statistics"},
  {cat:"conversion",pill:"Conversion & PQLs",pillClass:"pill-conversion",source:"1Capture Blog",date:"Nov 2025",title:"Free Trial Conversion Benchmarks 2025: The Definitive Guide (10,000+ SaaS Companies)",summary:"Analysis of 10,000+ SaaS companies establishes the median B2B trial-to-paid rate at 18.5%, with opt-out (credit card required) trials converting at 48.8% versus 18.2% for opt-in models. Companies deploying AI-personalized welcome flows saw a statistically significant +6.1 percentage point lift, translating to approximately $147,000 in additional ARR per company.",url:"https://www.1capture.io/blog/free-trial-conversion-benchmarks-2025"},
  {cat:"conversion",pill:"Conversion & PQLs",pillClass:"pill-conversion",source:"Artisan Growth Strategies",date:"Jan 2026",title:"SaaS Conversion Rate Benchmarks 2026: Data from 1,200+ Companies",summary:"Benchmarks across 1,200+ SaaS companies set the global average trial-to-paid conversion at 24.8%, with top-quartile performers reaching 38.2% through AI-driven behavioral nudges and precision onboarding sequences. SaaS companies that identify and systematically optimize their 'aha moment' achieve trial conversion rates 2.4x higher than those operating without a defined activation milestone.",url:"https://www.artisangrowthstrategies.com/blog/saas-conversion-rate-benchmarks-2026-data-1200-companies"},
  {cat:"conversion",pill:"Conversion & PQLs",pillClass:"pill-conversion",source:"HowdyGo",date:"Feb 2026",title:"Product Qualified Leads: The 2026 Guide (Beyond Free Trials)",summary:"PQLs convert at 5–6x the rate of marketing qualified leads because the product has already proven its value before sales is ever involved, eliminating the persuasion gap entirely. The TEV Framework—scoring PQL strength across Time-to-value, Engagement depth, and Virality signals—gives product and sales teams a shared, quantitative language for prioritizing outreach at the right moment.",url:"https://www.howdygo.com/blog/product-qualified-leads"},
  {cat:"loops",pill:"Growth Loops",pillClass:"pill-loops",source:"Product Led Alliance",date:"Dec 2025",title:"Top 11 Product-Led Growth Trends for 2025",summary:"A synthesis of the 11 structural trends reshaping PLG, from AI-personalized growth loops to the rise of community-led acquisition operating as a compounding flywheel alongside product virality. The piece argues that the most durable PLG companies engineer every user action—inviting a teammate, sharing a link, hitting a usage limit—as a direct, measurable input into the acquisition engine.",url:"https://www.productledalliance.com/top-11-plg-trends-for-2025/"},
  {cat:"loops",pill:"Growth Loops",pillClass:"pill-loops",source:"IdeaPlan",date:"Feb 2026",title:"Advanced PLG Monetization: 7 Revenue Levers Beyond Pricing in 2026",summary:"Usage-based upsell triggers—'You've consumed 90% of your API quota; upgrade for 10x limits'—deliver a 66% revenue-per-user increase without proportional user growth, making them the highest-efficiency expansion lever in modern PLG. The article maps six additional monetization levers, from network-effect pricing to outcome-based tiers, that top PLG operators are deploying across their products in 2026.",url:"https://www.ideaplan.io/blog/advanced-plg-monetization-strategies-2026"},
  {cat:"podcasts",pill:"Podcasts & Video",pillClass:"pill-podcast",source:"Lenny's Podcast",date:"Dec 2025",title:"Matt MacInnis on Growth, Retention, and the Metrics That Actually Matter at Rippling",summary:"Rippling CPO Matt MacInnis joins Lenny Rachitsky for a deep dive into the acquisition, retention, and churn frameworks shaping one of SaaS's fastest-scaling platforms, with sharp analysis of how product activation feeds long-term expansion revenue. The conversation is especially instructive on the interplay between onboarding completeness and net revenue retention at enterprise scale.",url:"https://www.lennysnewsletter.com/podcast"},
  {cat:"podcasts",pill:"Podcasts & Video",pillClass:"pill-podcast",source:"Growth Unhinged — Kyle Poyar",date:"Jan 2026",title:"The New PLG Playbook: Pricing, Expansion, and the AI Shift",summary:"Kyle Poyar breaks down how the shift to AI agents is disrupting traditional PLG activation and expansion playbooks for B2B SaaS teams. The Growth Unhinged podcast covers pricing evolution away from per-seat models, hybrid GTM architecture, and the behavioral data signals that reliably predict which free users will convert.",url:"https://www.growthunhinged.com/t/podcast"},
  {cat:"podcasts",pill:"Podcasts & Video",pillClass:"pill-podcast",source:"Grow Your B2B SaaS",date:"Dec 2025",title:"How PLG Will Change in 2026: AI Agents, Onboarding & Hybrid GTM",summary:"Roelof Otten joins from SaaS Summit Benelux to map the structural shifts hitting PLG teams in 2026—AI agents as product users, onboarding re-architecture for non-human workflows, and the operational case for hybrid GTM over pure self-serve. A rare European operator perspective on trends that are playing out globally across B2B SaaS.",url:"https://www.listennotes.com/podcasts/grow-your-b2b-saas-joran-hofman-ajzZxgEs6GS/"},
  {cat:"podcasts",pill:"Podcasts & Video",pillClass:"pill-podcast",source:"The SaaSiest Podcast",date:"Nov 2025",title:"Fabian Veit on Scaling Make.com with PLG + AI in a New Automation Era",summary:"Make.com CEO Fabian Veit unpacks what it takes to scale two hyperscale SaaS companies—first through enterprise sales-led motion, then through a PLG + AI automation model—revealing the architectural decisions that differentiated each phase. A rare case study in deliberately transitioning from sales-led to product-led at scale without disrupting existing enterprise revenue.",url:"https://www.listennotes.com/podcasts/the-saasiest-podcast-daniel-nackovski-a4cZFtGWIOn/"},
  {cat:"substack",pill:"Substack",pillClass:"pill-substack",source:"Growthmates · Kata Nyitrai",date:"Dec 2025",title:"PLG 2025 Rewind: How AI Changed Onboarding, Activation & UX",summary:"2025 was the year PLG quietly rewired itself — AI copilots and adaptive onboarding became the self-serve baseline, shifting the core metric from 'more signups' to 'more revenue per account' through account-level intent signals and dynamic activation paths. The piece identifies activation as the #1 growth pain across AI and SaaS products, with leading companies pulling ahead by layering AI-driven onboarding on top of self-serve foundations to build full-stack GTM engines.",url:"https://www.growthmates.news/p/plg-2025-rewind-biggest-trends-and"},
  {cat:"substack",pill:"Substack",pillClass:"pill-substack",source:"Elena's Growth Scoop · Elena Verna",date:"Jan 2026",title:"To PLG or Not PLG? — Rethinking When Product-Led Actually Works",summary:"Elena Verna challenges the default assumption that PLG is right for every early-stage B2B product, arguing you can't design a self-serve motion until you've watched enough customers use the product through sales-led engagement to know what's worth automating. The framework redefines PLG readiness as a function of product maturity and usage clarity — not company stage or investor pressure.",url:"https://www.elenaverna.com/p/to-plg-or-not-plg"},
  {cat:"substack",pill:"Substack",pillClass:"pill-substack",source:"PLGTM · Dave Rigotti",date:"Jan 2026",title:"Inside PLGTM 2025: Key Takeaways and What's Coming in 2026",summary:"Dave Rigotti recaps the PLGTM summit's evolution into 'Demand & Expand 2026' — a two-day event built for operators running the full spectrum of B2B GTM motions as PLG matures beyond acquisition into expansion-led revenue. The recap surfaces the dominant 2025 operator themes: usage-based monetization at scale, AI-native onboarding, and the practical reality of running product-led and sales-assisted motions simultaneously without org fragmentation.",url:"https://plgtm.substack.com/p/inside-plgtm-2025-a-recap-and-2026"},
  {cat:"substack",pill:"Substack",pillClass:"pill-substack",source:"The GTM Newsletter",date:"Feb 2026",title:"10 Product-Led Growth Plays Every Company Should Implement",summary:"A tactical breakdown of ten PLG motions organized by funnel stage — from frictionless signup patterns and intentional empty-state design to in-product expansion triggers and viral loops built around collaborative features. The framework argues PLG plays compound: companies implementing five or more of these motions consistently report 30–40% higher activation rates than those running fewer than three.",url:"https://thegtmnewsletter.substack.com/p/10-product-led-growth-plays-every"},
  {cat:"substack",pill:"Substack",pillClass:"pill-substack",source:"Pip Claire Brown",date:"Jan 2026",title:"PLG vs SLG: What Changed from 2024 to 2026 and Where It's All Heading",summary:"A structural comparison of PLG and SLG as they existed in 2024 versus where they're converging in 2026, with the central argument that pure-play versions of either motion are becoming strategically untenable as the market standardizes on hybrid. The analysis shows enterprise deal cycles are being compressed by PLG behavioral data — companies with self-serve usage signals convert sales-assisted deals in roughly half the time of those without.",url:"https://pipclairebrown.substack.com/p/plg-vs-slg-2024-vs-2026"}
];
let active='all';
function filter(cat,el){active=cat;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');render();}
function render(){
  const items=active==='all'?DATA:DATA.filter(d=>d.cat===active);
  document.getElementById('countDisplay').textContent=items.length+' items';
  document.getElementById('grid').innerHTML=items.map(d=>`
    <div class="card">
      <div class="card-meta"><span class="pill ${d.pillClass}">${d.pill}</span>
      <span class="card-date"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${d.date}</span></div>
      <div class="source">${d.source}</div>
      <h3>${d.title}</h3><p>${d.summary}</p>
      <a href="${d.url}" target="_blank" class="${d.cat==='podcasts'?'podcast-link':d.cat==='substack'?'substack-link':''}">${d.cat==='podcasts'?'🎧 Listen / Watch':d.cat==='substack'?'✍️ Read on Substack':'Read Article'}</a>
    </div>`).join('');
}
const now=new Date();
document.getElementById('dateDisplay').textContent=now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
render();
</script>
</body>
</html>
